                        opciones: ['Solo el salario del último mes', 'Salario + indemnización completa', 'Salario + vacaciones proporcionales + aguinaldo proporcional', 'Solo el aguinaldo'],

                {

                        respuesta: 2100, tolerancia: 1,
                        pista: '30 días de salario por cada año = un sueldo mensual por cada año.',
                        explicacion: '700 × 3 = $2,100. Un mes de sueldo por cada año trabajado.' },
                    { tipo: 'numerico', pregunta: 'Empleada con 5 años, sueldo $1,000. ¿Indemnización?',

        // ============================================================
        // COMPONENTE PRINCIPAL (ADAPTADO PARA HTML)
        // ============================================================

        function CursoPlanillas() {
            // Persistencia de datos
            const [completados, setCompletados] = useState(() => {
                const saved = localStorage.getItem('planillas_completados');
                return saved ? JSON.parse(saved) : {};
            });
            const [xp, setXp] = useState(() => {
                const saved = localStorage.getItem('planillas_xp');
                return saved ? parseInt(saved) : 0;
            });

            useEffect(() => {
                localStorage.setItem('planillas_completados', JSON.stringify(completados));
            }, [completados]);

            useEffect(() => {
                localStorage.setItem('planillas_xp', xp.toString());
            }, [xp]);

            const [pantalla, setPantalla] = useState('mapa');
            const [mundoIdx, setMundoIdx] = useState(0);
            const [leccionIdx, setLeccionIdx] = useState(0);
            const [pasoIdx, setPasoIdx] = useState(0);
            const [respuesta, setRespuesta] = useState('');
            const [opcionSel, setOpcionSel] = useState(null);
            const [mostrarFeedback, setMostrarFeedback] = useState(false);
            const [primerIntento, setPrimerIntento] = useState(true);
            const [mostrarPista, setMostrarPista] = useState(false);

            const mundo = MUNDOS[mundoIdx];
            const leccion = mundo?.lecciones[leccionIdx];
            const paso = leccion?.pasos[pasoIdx];

            const leccionDesbloqueada = (mIdx, lIdx) => {
                if (mIdx === 0 && lIdx === 0) return true;
                if (lIdx === 0) {
                    const mAnt = MUNDOS[mIdx - 1];
                    const ultLec = mAnt.lecciones[mAnt.lecciones.length - 1];
                    return completados[ultLec.id];
                }
                const lecAnt = MUNDOS[mIdx].lecciones[lIdx - 1];
                return completados[lecAnt.id];
            };

            const mundoCompletado = (m) => m.lecciones.every(l => completados[l.id]);
            const mundoProgreso = (m) => {
                const total = m.lecciones.length;
                const hechos = m.lecciones.filter(l => completados[l.id]).length;
                return { hechos, total, pct: Math.round((hechos/total)*100) };
            };

            const iniciarLeccion = (mIdx, lIdx) => {
                if (!leccionDesbloqueada(mIdx, lIdx)) return;
                setMundoIdx(mIdx);
                setLeccionIdx(lIdx);
                setPasoIdx(0);
                setRespuesta('');
                setOpcionSel(null);
                setMostrarFeedback(false);
                setMostrarPista(false);
                setPrimerIntento(true);
                setPantalla('leccion');
            };

            const verificar = () => {
                if (!paso) return null;
                if (paso.tipo === 'teoria') return { correcto: true };
                if (paso.tipo === 'opcion') return { correcto: opcionSel === paso.correcta };
                if (paso.tipo === 'vf') return { correcto: opcionSel === (paso.correcta ? 1 : 0) };
                if (paso.tipo === 'numerico') {
                    const num = parseFloat(respuesta);
                    if (isNaN(num)) return { correcto: false };
                    return { correcto: Math.abs(num - paso.respuesta) <= paso.tolerancia };
                }
                return null;
            };

            const handleEnviar = () => {
                if (paso.tipo === 'teoria') { avanzar(); return; }
                setMostrarFeedback(true);
                const res = verificar();
                if (res?.correcto) {
                    setXp(x => x + (primerIntento ? 10 : 5));
                }
            };

            const avanzar = () => {
                const esUltimoPaso = pasoIdx === leccion.pasos.length - 1;
                if (esUltimoPaso) {
                    setCompletados(c => ({ ...c, [leccion.id]: true }));
                    setPantalla('completado');
                } else {
                    setPasoIdx(pasoIdx + 1);
                    setRespuesta('');
                    setOpcionSel(null);
                    setMostrarFeedback(false);
                    setMostrarPista(false);
                    setPrimerIntento(true);
                }
            };

            const reintentar = () => {
                setMostrarFeedback(false);
                setRespuesta('');
                setOpcionSel(null);
                setPrimerIntento(false);
            };

            // Estilos (Pasados a un objeto literal JS)
            const S = styles; 

            // Renders
            if (pantalla === 'mapa') {
                const totalLecciones = MUNDOS.reduce((a, m) => a + m.lecciones.length, 0);
                const leccionesHechas = Object.keys(completados).length;
                const pctTotal = Math.round((leccionesHechas/totalLecciones)*100);

                return (
                    <div style={S.bg}>
                        <div style={S.papelTextura}></div>
                        <div style={S.contenedor}>
                            <div style={S.headerMapa}>
                                <div style={S.eyebrow}>CURSO INTERACTIVO</div>
                                <h1 style={S.tituloPrincipal}>Planillas <em style={S.tituloEm}>El Salvador</em></h1>
                                <div style={S.subtituloMapa}>De cero a experto. Siete mundos. Veintiún lecciones.</div>
                            </div>
                            <div style={S.statsCard}>
                                <div style={S.stat}><div style={S.statNum}>{xp}</div><div style={S.statLabel}>XP</div></div>
                                <div style={S.statSep}></div>
                                <div style={S.stat}><div style={S.statNum}>{leccionesHechas}/{totalLecciones}</div><div style={S.statLabel}>Lecciones</div></div>
                                <div style={S.statSep}></div>
                                <div style={S.stat}><div style={S.statNum}>{pctTotal}%</div><div style={S.statLabel}>Avance</div></div>
                            </div>
                            <div style={S.mundosLista}>
                                {MUNDOS.map((m, mIdx) => {
                                    const prog = mundoProgreso(m);
                                    const completo = mundoCompletado(m);
                                    const desbloqueado = mIdx === 0 || mundoCompletado(MUNDOS[mIdx-1]);
                                    return (
                                        <div key={m.id} style={{
                                            ...S.mundoCard,
                                            borderLeft: `6px solid ${desbloqueado ? m.color : '#bbb'}`,
                                            opacity: desbloqueado ? 1 : 0.55,
                                        }}>
                                            <div style={S.mundoHeader}>
                                                <div style={{ ...S.mundoIcono, background: desbloqueado ? m.color : '#bbb' }}>
                                                    {desbloqueado ? m.icono : '🔒'}
                                                </div>
                                                <div style={S.mundoInfo}>
                                                    <div style={S.mundoNumero}>MUNDO {mIdx + 1}</div>
                                                    <div style={S.mundoTitulo}>{m.titulo}</div>
                                                    <div style={S.mundoDesc}>{m.descripcion}</div>
                                                </div>
                                                {completo && <div style={S.mundoCheck}>✓</div>}
                                            </div>
                                            <div style={S.progBarra}>
                                                <div style={{ ...S.progRelleno, width: `${prog.pct}%`, background: m.color }}></div>
                                            </div>
                                            {desbloqueado && (
                                                <div style={S.leccionesGrid}>
                                                    {m.lecciones.map((l, lIdx) => {
                                                        const hecho = completados[l.id];
                                                        const desbloq = leccionDesbloqueada(mIdx, lIdx);
                                                        return (
                                                            <button
                                                                key={l.id}
                                                                style={{
                                                                    ...S.leccionBtn,
                                                                    background: hecho ? m.color : (desbloq ? '#fffbf0' : '#e8e2d4'),
                                                                    color: hecho ? '#fff' : (desbloq ? '#1a1a1a' : '#888'),
                                                                    cursor: desbloq ? 'pointer' : 'not-allowed',
                                                                    borderColor: hecho ? m.color : (desbloq ? '#c9a04a' : '#bbb'),
                                                                }}
                                                                onClick={() => desbloq && iniciarLeccion(mIdx, lIdx)}
                                                            >
                                                                <div style={S.leccionNum}>{lIdx + 1}</div>
                                                                <div style={S.leccionTitulo}>{l.titulo}</div>
                                                                {hecho && <div style={S.leccionEstrella}>★</div>}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            if (pantalla === 'completado') {
                return (
                    <div style={S.bg}>
                        <div style={S.papelTextura}></div>
                        <div style={S.contenedor}>
                            <div style={S.completadoCard}>
                                <div style={S.completadoStar}>★</div>
                                <div style={S.completadoEyebrow}>LECCIÓN COMPLETADA</div>
                                <h2 style={S.completadoTitulo}>{leccion.titulo}</h2>
                                <div style={S.completadoMsg}>Otro paso menos antes de tu entrevista de Planillas. La práctica es lo que separa al que sabe del que improvisa.</div>
                                <div style={S.completadoXp}><div style={S.completadoXpNum}>+{xp}</div><div style={S.completadoXpLabel}>XP totales</div></div>
                                <button style={S.btnPrincipal} onClick={() => setPantalla('mapa')}>VOLVER AL MAPA</button>
                            </div>
                        </div>
                    </div>
                );
            }

            const fb = mostrarFeedback ? verificar() : null;
            return (
                <div style={S.bg}>
                    <div style={S.papelTextura}></div>
                    <div style={S.contenedor}>
                        <div style={S.leccionHeader}>
                            <button style={S.btnVolver} onClick={() => setPantalla('mapa')}>← Salir</button>
                            <div style={S.leccionHeaderTitulo}>
                                <div style={{...S.leccionHeaderMundo, color: mundo.color }}>{mundo.icono} {mundo.titulo.toUpperCase()}</div>
                                <div style={S.leccionHeaderNombre}>{leccion.titulo}</div>
                            </div>
                        </div>
                        <div style={S.progLeccion}><div style={{ ...S.progLeccionRelleno, width: `${((pasoIdx + (mostrarFeedback?1:0))/leccion.pasos.length)*100}%`, background: mundo.color }}></div></div>
                        <div style={S.pasoCard}>
                            {paso.tipo === 'teoria' && (
                                <>
                                    <div style={S.pasoEyebrow}>CONCEPTO</div>
                                    <h2 style={S.pasoTitulo}>{paso.titulo}</h2>
                                    <div style={S.pasoTexto}>{paso.texto.split('\n\n').map((p, i) => <p key={i} style={S.pasoTextoP}>{p}</p>)}</div>
                                    {paso.ejemplo && <div style={S.ejemploBox}><div style={S.ejemploLabel}>EJEMPLO</div><pre style={S.ejemploTexto}>{paso.ejemplo}</pre></div>}
                                </>
                            )}
                            {paso.tipo === 'opcion' && (
                                <>
                                    <div style={S.pasoEyebrow}>PREGUNTA</div>
                                    <h2 style={S.pasoPregunta}>{paso.pregunta}</h2>
                                    <div style={S.opcionesLista}>{paso.opciones.map((op, i) => {
                                        let style = {...S.opcionBtn};
                                        if(mostrarFeedback) {
                                            if(i === paso.correcta) style = {...style, ...S.opcionCorrecta};
                                            else if(i === opcionSel) style = {...style, ...S.opcionIncorrecta};
                                        } else if(opcionSel === i) style = {...style, ...S.opcionSeleccionada};
                                        return (
                                            <button key={i} style={style} onClick={() => !mostrarFeedback && setOpcionSel(i)}>
                                                <span style={S.opcionLetra}>{String.fromCharCode(65+i)}</span>
                                                <span style={S.opcionTexto}>{op}</span>
                                            </button>
                                        );
                                    })}</div>
                                </>
                            )}
                            {paso.tipo === 'vf' && (
                                <>
                                    <div style={S.pasoEyebrow}>VERDADERO O FALSO</div>
                                    <h2 style={S.pasoPregunta}>{paso.pregunta}</h2>
                                    <div style={S.vfLista}>{[ {idx:1, label:'VERDADERO', val:true}, {idx:0, label:'FALSO', val:false} ].map(({idx, label, val}) => {
                                        let style = {...S.vfBtn};
                                        if(mostrarFeedback) {
                                            if(val === paso.correcta) style = {...style, ...S.opcionCorrecta};
                                            else if(idx === opcionSel) style = {...style, ...S.opcionIncorrecta};
                                        } else if(opcionSel === idx) style = {...style, ...S.opcionSeleccionada};
                                        return <button key={idx} style={style} onClick={() => !mostrarFeedback && setOpcionSel(idx)}>{label}</button>
                                    })}</div>
                                </>
                            )}
                            {paso.tipo === 'numerico' && (
                                <>
                                    <div style={S.pasoEyebrow}>CASO PRÁCTICO</div>
                                    <h2 style={S.pasoPregunta}>{paso.pregunta}</h2>
                                    <div style={S.inputWrap}><span style={S.inputDolar}>$</span><input type="number" step="0.01" value={respuesta} onChange={e => setRespuesta(e.target.value)} style={S.inputNum} disabled={mostrarFeedback} placeholder="0.00"/></div>
                                    {paso.pista && !mostrarFeedback && (
                                        <div style={S.pistaWrap}>{!mostrarPista ? <button style={S.btnPista} onClick={()=>setMostrarPista(true)}>💡 Necesito una pista</button> : <div style={S.pistaContenido}><strong>Pista:</strong> {paso.pista}</div>}</div>
                                    )}
                                </>
                            )}
                            {mostrarFeedback && fb && (
                                <div style={{...S.feedback, background: fb.correcto ? '#e8f3ea' : '#fbeae8', borderColor: fb.correcto ? '#4a7c4e' : '#a83232'}}>
                                    <div style={{...S.feedbackTitulo, color: fb.correcto ? '#2d5530' : '#7a1f1f'}}>{fb.correcto ? '✓ Correcto' : '✗ No es correcto'}</div>
                                    {paso.explicacion && <div style={S.feedbackTexto}>{paso.explicacion}</div>}
                                </div>
                            )}
                        </div>
                        <div style={S.botonera}>
                            {!mostrarFeedback ? (
                                <button style={{...S.btnPrincipal, opacity: (paso.tipo === 'teoria' || (paso.tipo === 'numerico' && respuesta) || (paso.tipo !== 'numerico' && opcionSel !== null)) ? 1 : 0.5}} onClick={handleEnviar}>
                                    {paso.tipo === 'teoria' ? 'ENTENDIDO →' : 'VERIFICAR'}
                                </button>
                            ) : (
                                <>
                                    {fb && !fb.correcto && paso.tipo !== 'teoria' && <button style={S.btnSecundario} onClick={reintentar}>Reintentar</button>}
                                    <button style={S.btnPrincipal} onClick={avanzar}>{pasoIdx === leccion.pasos.length - 1 ? 'COMPLETAR LECCIÓN' : 'SIGUIENTE →'}</button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // ESTILOS (IGUALES A TU PROTOTIPO)
        // ============================================================
        const styles = {
            bg: { minHeight: '100vh', background: '#f4ead5', padding: '1rem', fontFamily: '"Crimson Pro", serif', color: '#2a1f12', position: 'relative' },
            papelTextura: { position: 'fixed', inset: 0, pointerEvents: 'none', backgroundImage: `radial-gradient(ellipse at top left, rgba(201,160,74,0.08), transparent 50%), repeating-linear-gradient(0deg, transparent 0, transparent 28px, rgba(26,58,92,0.04) 28px, rgba(26,58,92,0.04) 29px)`, zIndex: 0 },
            contenedor: { maxWidth: '720px', margin: '0 auto', position: 'relative', zIndex: 1 },
            headerMapa: { textAlign: 'center', marginBottom: '2rem', paddingTop: '1rem' },
            eyebrow: { fontFamily: '"JetBrains Mono", monospace', fontSize: '0.7rem', letterSpacing: '4px', color: '#c9a04a', marginBottom: '0.8rem', fontWeight: 700 },
            tituloPrincipal: { fontFamily: '"DM Serif Display", serif', fontSize: '2.4rem', margin: 0, color: '#1a3a5c' },
            tituloEm: { color: '#a83232', fontStyle: 'italic' },
            subtituloMapa: { fontSize: '1rem', color: '#5a4a32', marginTop: '0.5rem', fontStyle: 'italic' },
            statsCard: { background: '#fffbf0', border: '1px solid #c9a04a', borderRadius: '4px', padding: '1rem', display: 'flex', justifyContent: 'space-around', marginBottom: '2rem', boxShadow: '3px 3px 0 rgba(26,58,92,0.1)' },
            stat: { textAlign: 'center', flex: 1 },
            statNum: { fontFamily: '"DM Serif Display", serif', fontSize: '1.6rem', color: '#1a3a5c' },
            statLabel: { fontFamily: '"JetBrains Mono", monospace', fontSize: '0.65rem', letterSpacing: '2px', color: '#5a4a32', marginTop: '0.3rem', textTransform: 'uppercase' },
            statSep: { width: '1px', height: '36px', background: '#c9a04a', opacity: 0.4 },
            mundosLista: { display: 'flex', flexDirection: 'column', gap: '1rem' },
            mundoCard: { background: '#fffbf0', border: '1px solid #d4c9a8', borderRadius: '4px', padding: '1.2rem', boxShadow: '4px 4px 0 rgba(26,58,92,0.08)' },
            mundoHeader: { display: 'flex', alignItems: 'flex-start', gap: '1rem', marginBottom: '0.8rem' },
            mundoIcono: { width: '48px', height: '48px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.4rem', color: '#fff', flexShrink: 0 },
            mundoInfo: { flex: 1 },
            mundoNumero: { fontFamily: '"JetBrains Mono", monospace', fontSize: '0.7rem', color: '#5a4a32', fontWeight: 700 },
            mundoTitulo: { fontFamily: '"DM Serif Display", serif', fontSize: '1.4rem', color: '#1a3a5c' },
            mundoDesc: { fontSize: '0.92rem', color: '#5a4a32' },
            mundoCheck: { fontSize: '1.5rem', color: '#4a7c4e' },
            progBarra: { height: '4px', background: '#e8e2d4', borderRadius: '2px', marginBottom: '0.8rem' },
